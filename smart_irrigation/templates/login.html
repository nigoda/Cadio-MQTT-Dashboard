<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Smart Irrigation</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 36px 32px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow);
}
.login-card h1 {
  text-align: center;
  color: var(--primary);
  font-size: 1.4rem;
  margin-bottom: 6px;
}
.login-card .subtitle {
  text-align: center;
  color: var(--text-sec);
  font-size: .82rem;
  margin-bottom: 24px;
}
.login-card label {
  display: block;
  font-size: .75rem;
  color: var(--text-sec);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 4px;
  margin-top: 14px;
}
.login-card input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: .9rem;
}
.login-card input:focus { outline: none; border-color: var(--primary); }
.login-card .btn-login {
  width: 100%;
  margin-top: 24px;
  padding: 12px;
  font-size: .95rem;
}
.login-error {
  background: rgba(239,68,68,.12);
  border: 1px solid var(--red);
  border-radius: var(--radius-sm);
  color: var(--red);
  padding: 8px 12px;
  font-size: .82rem;
  margin-bottom: 12px;
  text-align: center;
}
</style>
</head>
<body>
<div class="login-card">
  <h1>&#127793; Smart Irrigation</h1>
  <p class="subtitle">Sign in with your Cadio account</p>

  {% if error %}
  <div class="login-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <label>Email</label>
    <input type="email" name="email" placeholder="you@example.com" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit" class="btn btn-primary btn-login">Sign In</button>
  </form>
</div>
</body>
</html>
